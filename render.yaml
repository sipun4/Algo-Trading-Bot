services:
  - type: web
    name: angelone-algo-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: DASHBOARD_PASSWORD
        sync: false          # Set manually in Render dashboard
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_CODE
        sync: false
      - key: ANGEL_PASSWORD
        sync: false
      - key: ANGEL_TOTP_TOKEN
        sync: false
      - key: FLASK_SECRET
        generateValue: true  # Auto-generated by Render
